services:
  quake1:
    build: ./server
    image: ioq3-server
    container_name: quake1
    restart: unless-stopped
    ports:
      - "27960:27960/udp"
    volumes:
      - ./gamedata/baseq3:/opt/quake3/baseq3
      - ./server/configs/shared:/opt/quake3/configs/shared:ro
      - ./server/configs/quake1-ffa:/opt/quake3/configs/server:ro
    environment:
      - SERVER_ARGS=+exec server.cfg +exec ${FFA_CONFIG} +exec ${MAPS_FFA}
      - FASTDL_URL=${FASTDL_URL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SERVER_MOTD=${SERVER_MOTD}
    healthcheck:
      test: ["CMD", "pidof", "ioq3ded"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  quake2:
    image: ioq3-server
    container_name: quake2
    restart: unless-stopped
    ports:
      - "27961:27960/udp"
    volumes:
      - ./gamedata/baseq3:/opt/quake3/baseq3
      - ./mods/osp:/opt/quake3/osp
      - ./server/configs/shared:/opt/quake3/configs/shared:ro
      - ./server/configs/quake2-osp:/opt/quake3/configs/server:ro
    environment:
      - SERVER_ARGS=+set fs_game osp +exec ctf.cfg
      - FASTDL_URL=${FASTDL_URL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SERVER_MOTD=${SERVER_MOTD}
    healthcheck:
      test: ["CMD", "pidof", "ioq3ded"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  quake3:
    image: ioq3-server
    container_name: quake3
    restart: unless-stopped
    ports:
      - "27962:27960/udp"
    volumes:
      - ./gamedata/baseq3:/opt/quake3/baseq3
      - ./gamedata/missionpack:/opt/quake3/missionpack
      - ./server/configs/shared:/opt/quake3/configs/shared:ro
      - ./server/configs/quake3-ta:/opt/quake3/configs/server:ro
    environment:
      - SERVER_ARGS=+set fs_game missionpack +exec server.cfg +exec ${Q3TA_CONFIG} +exec ${MAPS_Q3TA}
      - FASTDL_URL=${FASTDL_URL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SERVER_MOTD=${SERVER_MOTD}
    healthcheck:
      test: ["CMD", "pidof", "ioq3ded"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  fastdl:
    image: nginx:1.27-alpine
    container_name: fastdl
    expose:
      - "80"
    volumes:
      - ./web/fastdl/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/fastdl/public:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  landing:
    build: ./web/landing
    image: ioq3-landing
    container_name: quake-landing
    depends_on:
      - quake1
      - quake2
      - quake3
    expose:
      - "3000"
    environment:
      PORT: 3000
      SITE_TITLE: ${SITE_TITLE:-IOQ3 SERVER}
      SITE_SUBTITLE: ${SITE_SUBTITLE:-}
      SITE_DOMAIN: ${DOMAIN:-localhost}
      SITE_GITHUB_USER: ${SITE_GITHUB_USER:-}
      SERVERS_JSON: |
        [
          {"name": "FFA", "host": "quake1", "port": 27960, "displayPort": 27960},
          {"name": "OSP", "host": "quake2", "port": 27960, "displayPort": 27961},
          {"name": "Q3TA", "host": "quake3", "port": 27960, "displayPort": 27962}
        ]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: quake-caddy
    restart: unless-stopped
    depends_on:
      - landing
      - fastdl
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # For HTTP/3
    volumes:
      - ./web/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - FASTDL_SUBDOMAIN=${FASTDL_SUBDOMAIN:-_disabled.local}
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --no-check-certificate -q https://localhost:443/ || wget --spider -q http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  caddy-data:
  caddy-config:
